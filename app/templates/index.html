<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>peopleFabrix — HR Assistant</title>
  <link rel="stylesheet" href="/static/css/style.css?v={{ asset_version }}">
</head>
<body>
  <header class="app-header">
    <h1>peopleFabrix</h1>
    <p>Ask anything about HR policies, benefits, or your team.</p>
  </header>

  <main class="panels">
    <section class="panel" id="question-panel">
      <h2>Ask a question</h2>
      <div class="starters" id="starters">
        <button type="button" class="starter-chip">How many days of paternity leave do I get?</button>
        <button type="button" class="starter-chip">When does health insurance begin for a new employee?</button>
        <button type="button" class="starter-chip">What US holidays are observed this year?</button>
      </div>
      <form id="ask-form">
        <textarea id="question-input" placeholder="e.g. How many vacation days do new employees get?" rows="6" required></textarea>
        <button type="submit" id="ask-button">Ask</button>
      </form>
    </section>

    <section class="panel" id="response-panel">
      <h2>Response</h2>
      <div id="transcript" class="transcript">
        <p class="placeholder">Your conversation will appear here.</p>
      </div>
    </section>
  </main>

  <script src="/static/js/chat.js?v={{ asset_version }}"></script>
</body>
</html>
